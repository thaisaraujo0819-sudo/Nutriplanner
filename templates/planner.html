<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title> Perfil Nutriplanner </title>
    <style>
        * {
      box-sizing: border-box;
    }
        body {
            margin: 0;
            min-height: 100dvh;
            display:flex ; 
            justify-content: center;
            align-items: center;
            background: rgb(209, 174, 161); 
            font-family:sans-serif ; 
            padding: 24px;
        }
        .container-grid {
            display: grid;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgb(163, 196, 206);
            border: 2px solid rgb(57, 78, 61);
            border-radius: 8px;
            padding: clamp(1px, 2vw, 30px);
            gap: 20px;
            grid-template-columns:  minmax(0, 1fr) minmax(0, 1.4fr);
            align-items: center;
            
        }
        /* --------- basics settings -----------*/
        .title_page{
            grid-column: 1 / -1;  
            margin: 0; 
            text-align: center;
            font-size: clamp(12px, 3vw, 20px);
            background-color: rgba(255, 0, 0, 0.3); 
        }
        .base_words{
            font-style: initial;
            font-size:  clamp(10px, 3vw, 15px);
            text-align: center;
        }
        .box{
            background-color: rgba(98, 98, 99, 0.274);
            color: rgb(3, 8, 8);
            border: black;
            border-radius: 0vh;
            cursor: text;
            font-weight: bold;
            font-size: clamp(14px, 3vw, 18px);
        }
        .table_title{
            grid-column: 1 / -1;  
            margin: 0; 
            text-align: center;
            font-size: clamp(12px, 3vw, 20px);
            font-style: initial;
            color: blue;
        }
        .background{
            display: grid;
            grid-template-columns: 1fr 1.2fr 2fr;
            column-gap: 10px;
            row-gap: 2px;
            align-items: center;
            grid-column: 1 / -1;
            width: 100%;
            padding: 6px 12px;
        }
        .background_pair{
            background-color: rgba(50, 93, 128, 0.274);
        }
        .background_unpaired{
            background-color: rgba(54, 54, 95, 0.274);
        }
        /* --------------- grid --------------- */
        .group_style{
            grid-column: 1;
            margin: 0; 
            text-align: center;
            font-size: clamp(10px, 3vw, 15px);
            font-style: initial;
            color: rgb(24, 24, 63);
            width: 100%;
            grid-row: 1/3;
        }
        .subgroup{
            grid-column: 2;
        }
        .food{
            grid-column: 3;
        }
        
         /* ------------- bottoms -------------*/
        .bottom-save{
            grid-column: 1/ span 2;
            grid-row: 15;
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            padding:  clamp(8px, 30px);
            border: 1px solid #333;
            font-size: clamp(6px, 4vw, 25px);
        }
        .bottom_back {
            grid-column: 1/ span 2;
            grid-row: 16;
            background: rgb(255, 255, 255);
            color: rgb(3, 8, 8);
            cursor: pointer;
            font-weight: bold;
            padding:  clamp(8px, 30px);
            border: 1px solid #333;
            font-size: clamp(6px, 4vw, 25px);
            transition: 0.1s;
        }
        .bottom_logout{
            grid-column: 1/ span 2;
            grid-row: 17;
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            padding:  clamp(8px, 30px);
            border: 1px solid #333;
            font-size: clamp(6px, 4vw, 25px);            
        }
        .input-base {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            background-color: rgba(210, 210, 214, 0.274);
            color: rgb(0, 0, 0);
            border: 1px solid black;
            border-radius: 4px;
            font-weight: bold;
            font-size: clamp(10px, 2vw, 16px);
        }

    </style>
</head>
