<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title> Alterar Nutriplanner </title>
    <style>
        * {
      box-sizing: border-box;
    }
        body {
            margin: 0;
            min-height: 100dvh;
            display:flex ; 
            justify-content: center;
            align-items: center;
            background: rgb(223, 155, 130); 
            font-family:sans-serif ; 
            padding: 24px;
        }
        .container-grid {
            display: grid;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: rgb(163, 196, 206);
            border: 2px solid rgb(57, 78, 61);
            border-radius: 8px;
            padding: clamp(2px, 3vw, 32px);
            gap: 16px;
            grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
            align-items: center;
            
        }
        .titulo {
            grid-column: 1 / -1;  
            margin: 0; 
            text-align: center;
            font-size: clamp(12px, 3vw, 20px);
            background-color: rgba(255, 0, 0, 0.3); 
        }
        .base_words{
            font-style: normal;
            font-size:  clamp(12px, 8vw, 22px);
        }
        .box{
            background-color: rgba(98, 98, 99, 0.274);
            color: rgb(3, 8, 8);
            border: black;
            border-radius: 0vh;
            cursor: text;
            font-weight: bold;
            font-size: clamp(15px, 8vw, 22px);
        }
        .box-gmail{
            grid-column: 2;
            grid-row: 2;
        }
        .gmail{
            grid-column: 1;
            grid-row: 2;
        }
        .bottom-enter{
            grid-column: 1/ span 2;
            grid-row: 4;
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            padding:  clamp(8px, 30px);
            border: 1px solid #333;
            font-size: clamp(6px, 3vw, 25px);
        }
        .bottom_back {
            grid-column: 1/ span 2;
            grid-row: 5;
            background: rgb(255, 255, 255);
            color: rgb(3, 8, 8);
            cursor: pointer;
            font-weight: bold;
            padding:  clamp(8px, 30px);
            border: 1px solid #333;
            font-size: clamp(6px, 3vw, 25px);
            transition: 0.1s;
        }
        .bottom-enter {
            transform: translateY(2px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    {% if request.args.get('email_error') %}
        <p class="error-message">Current email is incorrect.</p>
    {% endif %}

    {% if request.args.get('password_error') %}
    <p class="error-message">Password is incorrect.</p>
    {% endif %}

    {% if request.args.get('saved') %}
    <p class="success-message">Email updated successfully.</p>
    {% endif %}

    <form class="container-grid" id="form-alterar" action="{{ url_for('forgot_password') }}" method="POST">
        <h1 class="titulo">  Esqueceu a senha </h1>

        <label for="gmail" class="gmail base_words">  Email </label>
        <input id= "gmail" name="gmail" class="box-gmail box" type="email" required>
        
        <button id="bottomEnter" type="submit" class="bottom-enter"> Enviar </button>

        <button id="bottomBack" type="button" onclick="history.back()" class="bottom_back"> Voltar </button>
    </form>
    
    <script>

        formulario.addEventListener("submit", function(event) {
            const gmail = campoGmail.value.trim();
            const password = campoPassword.value.trim();
            const repeat_password = campoRepeatPassword.value.trim();
            if (gmail === "" || password === "" || repeat_password ===""){
                event.preventDefault();
                alert("Preencha gmail e/ou senha");
                return;
            }
            
        });
    
    </script>

</body>
</html>
