<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>    
    <link rel="stylesheet" href="{{url_for('static', filename='register.css')}}"/>

    <title> Alterar Nutriplanner </title>
    
</head>
<body>
<div class="bg-home">
    {% if request.args.get('email_error') %}
        <p class="error-message">Current email is incorrect.</p>
    {% endif %}

    {% if request.args.get('password_error') %}
    <p class="error-message">Password is incorrect.</p>
    {% endif %}

    {% if request.args.get('saved') %}
    <p class="success-message">Email updated successfully.</p>
    {% endif %}

    <form class="container-grid" id="form-alterar" action="{{ url_for('forgot_password') }}" method="POST">
        <h1 class="titulo">  Esqueceu a senha </h1>

        <label for="gmail" class="gmail base_words">  Email </label>
        <input id= "gmail" name="gmail" class="box-gmail box" type="email" required>
        
        <div class="actions">
            <button id="bottomEnter" type="submit" class="bottom enter"> Enviar </button>

            <button id="bottomBack" type="button" onclick="window.location.href='/login'" class="bottom back"> Voltar </button>
        </div>

    </form>
</div>
    <script>

        formulario.addEventListener("submit", function(event) {
            const gmail = campoGmail.value.trim();
            const password = campoPassword.value.trim();
            const repeat_password = campoRepeatPassword.value.trim();
            if (gmail === "" || password === "" || repeat_password ===""){
                event.preventDefault();
                alert("Preencha gmail e/ou senha");
                return;
            }
            
        });
    
    </script>

</body>
</html>
