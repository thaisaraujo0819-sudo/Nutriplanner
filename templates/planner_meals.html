<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>    
        
    <link rel="stylesheet" href="{{url_for('static', filename='planner.css')}}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link
        rel="preload"
        as="image"
        href="{{ url_for('static', filename='imagem/bg_perfil.webp') }}">
    <title> Planejar Nutriplanner </title>

    <style>
        * {
      box-sizing: border-box;
    }
        body {
            margin: 0;
            min-height: 100dvh;
            display:flex ; 
            justify-content: center;
            align-items: center;
            background: rgb(209, 174, 161); 
            font-family:sans-serif ; 
            padding: 24px;
        }

    </style>
</head>
<body>
<div class="bg-home" >
    <form id="form-perfil" action="{{ url_for('planner_meals', user_profile_id=user_profile_id, meals=meals) }}" method="POST">
        <header >
            
            <nav class="header-content">
            <div class="title">
                <h1> Planejamento {{ name }}</h1>
            </div>
            </nav>
        </header>
        <div class="container">
            <a href="{{ url_for('menu') }}" class="logo_perfil">
                <img
                    src="{{ url_for('static', filename='imagem/menu_logo.png') }}"
                    alt="perfil_logo"
                    class="perfil_img"/>
            </a>

            <div class="container-grid"  >
                <div class="meal-select-row">
                    <label for="choice_meal" class="meal base_words">Refeicao</label>

                    <select id="choice_meal" name="choice_meal" class="input-base choice_meal" required>
                    <option value=""  selected> Escolha....</option>
                    {% for meals in choice_meal %}
                        <option value="{{meals['id']}}" > {{meals['meal_pt']}}</option>
                    {% endfor %}
                    </select> 
                </div>

                {% for choice_id, snack in organize_meals.items() %}
                    {% for meal in snack %}
                    <label class="meal-option box" data-meal-group="{{choice_id}}" style="display: none;">

                    <input type="checkbox" name="selected_meals" value="{{meal['history_meal_id']}}" class="box">
                        {% for food in meal['foods'] %}
                            {{ food['name'] }}
                            {% if not loop.last %},
                                {% endif %}
                        {% endfor %}
                    </label>
                    {% endfor %}
                {% endfor %}

                <button id="bottom_logout" type="submit" name="action" value="delete" class="bottom_exclude"> Excluir </button>

                <button id="bottomNext" type="submit" class="bottom_next"> Inserir Quantidades </button>
            </div>

            <div class="logo">
                <img
                    src="{{ url_for('static', filename='imagem/logo_semfundo.png') }}"
                    alt="logo"
                    class="logo_img"
                    />
            </div>
        </div>

    </form>
</div>
    {% if login_error %}
    <p>Usuario nao encontrado ou senha incorreta.</p>
    {% endif %}

    
    <script>

        document.addEventListener("DOMContentLoaded", function() {
            window.addEventListener("load", () => {
                const select = document.getElementById("choice_meal");
                select.dispatchEvent(new Event("change"));
            });
            // ------------ bottoms ----------------
            const bottomsave= document.getElementById("bottomsave");

            // ----------- bottom choice and dictionary list --------

            const select_meal = document.getElementById("choice_meal")
            const organize_meals = JSON.parse('{{ organize_meals | tojson | safe }}');
            console.log("organize_meals ", organize_meals)

            // ----------- subgroups -> foods -----------
            
            select_meal.addEventListener("change", function(){
                const selected = String(this.value);

                console.log("selecionado: ", selected);

                const all = document.querySelectorAll(".meal-option");

                console.log("MEALS AO CARREGAR:", all.length);
                
                all.forEach(el => {
                    const group =String(el.dataset.mealGroup);
                    console.log("encontrados agora group : ", group);
                    if (group == selected){
                        el.style.display = "flex";
                    } else {
                        el.style.display = "none"
                    }
                })
            });
        })

    
    </script>

</body>
</html>
