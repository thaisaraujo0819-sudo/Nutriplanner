<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>    
    <link rel="stylesheet" href="{{url_for('static', filename='login.css')}}"/>
        <link
        rel="preload"
        as="image"
        href="{{ url_for('static', filename='imagem/favorita.webp') }}">
    <title>Login</title>

</head>
<body>
<div class="bg-home">
    <form class="container-grid" id="form-login" action="{{url_for('login')}} "method="POST">
        <h1 class="titulo">  LOGIN </h1>

        <label for="gmail" class="gmail"> Gmail </label>
        <input id= "gmail" name="gmail" class="insert-gmail box" type="email" required>

        <label for="password" class="password"> Password </label>
        <input id="password" name="password" class="insert-password box" type="password" required> 
        
        <div class="actions">
            <button id="bottomEnter" type="submit" class="bottom enter">
                Entrar
            </button>
            <button id="bottomNew" type="button" class="bottom new-login">
                Novo Usuario
            </button>
            <button id="bottom-forgot_password" type="button" class="bottom forgot_password">             
                Esqueceu a Senha
            </button>
            <button id="bottomBack" type="button" onclick="window.location.href='/nutriplanner'" class="bottom back"> Voltar </button>
        </div>
    </form>
</div>
    {% if login_error %}
    <p class="login-error">Usuario nao encontrado ou senha incorreta.</p>
    {% endif %}

    
    <script>
        const formulario = document.getElementById("form-login");
        const campoGmail = document.getElementById("gmail");
        const campoPassword = document.getElementById("password");
        const bottomEnter = document.getElementById("bottomEnter");
        const bottomNew = document.getElementById("bottomNew");
        const bottom_forgot_pass = document.getElementById("bottom-forgot_password")

        bottomNew.addEventListener("click", function(){
            window.location.href = "{{url_for('register')}}";});
        
        bottom_forgot_pass.addEventListener("click", function(){
            window.location.href = "{{url_for('forgot_password')}}";});

        formulario.addEventListener("submit", function(event) {
            

            const gmail = campoGmail.value.trim();
            const password = campoPassword.value.trim();
            if (gmail === "" || password === ""){
                event.preventDefault();
                alert("Preencha gmail e senha");
                return;
            }
            
        });
    
    </script>

</body>
</html>
