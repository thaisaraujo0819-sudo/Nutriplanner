<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>    
    <link rel="stylesheet" href="{{url_for('static', filename='register.css')}}"/>
    
    <title> Cadastro Nutriplanner </title>

</head>

<body>
<div class="bg-home">
    <form class="container-grid" id="form-cadastro" action="{{ url_for('register') }}" method="POST">
        <h1 class="titulo">  CADASTRO </h1>

        <label for="gmail" class="gmail"> Email </label>
        <input id= "gmail" name="gmail" class="insert-gmail box" type="email" required>

        <label for="password" class="password"> Senha </label>
        <input id="password" name="password" class="insert-password box" type="password" required> 
        
        <label for="repeat_password" class="repeat_password"> Repita a Senha </label>
        <input id="repeat_password" name="repeat_password" class="insert-repeat_password box" type="password" required> 

        <div class="actions">
            <button id="bottomEnter" type="submit" class="bottom enter"> Cadastrar </button>

            <button id="bottomBack" type="button" onclick="history.back()" class="bottom back"> Voltar </button>
        </div>
    </form>
</div>

    {% if login_error %}
    <p>Preencha todos os campos.</p>
    {% endif %}

    
    <script>
        const formulario = document.getElementById("form-cadastro");
        const campoGmail = document.getElementById("gmail");
        const campoPassword = document.getElementById("password");
        const campoRepeatPassword = document.getElementById("repeat_password");
        const bottomEnter = document.getElementById("bottomEnter");


        formulario.addEventListener("submit", function(event) {
            const gmail = campoGmail.value.trim();
            const password = campoPassword.value.trim();
            const repeat_password = campoRepeatPassword.value.trim();
            if (gmail === "" || password === "" || repeat_password ===""){
                event.preventDefault();
                alert("Preencha gmail e/ou senha");
                return;
            }
            
        });
    
    </script>

</body>
</html>
